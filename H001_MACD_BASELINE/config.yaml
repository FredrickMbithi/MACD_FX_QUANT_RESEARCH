# Sample config.yaml for H001_MACD_BASELINE
#
# H001 is a stop-and-reverse strategy: a position stays open until the
# OPPOSITE crossover signal arrives, a regime-change logic exit fires,
# or the catastrophic stop-loss / take-profit levels are hit intrabar.
# risk.catastrophic_sl_pips sets the fixed SL distance; the TP distance
# is that same distance scaled by execution.DEFAULT_RISK_REWARD_RATIO
# (see execution.run_backtest()'s STEP 2/STEP 3).
#
# This documents the exact keys main.py reads.

data:
  raw_csv_path: data/raw/EURUSD_H1_20160101_20260702_20260703_164510.csv
  symbol: EURUSD
  timeframe: H1

strategy:
  signal_source: macd
  macd_fast_period: 12
  macd_slow_period: 26
  macd_signal_period: 9

signals:
  feature_set:
    - returns
    - volatility
  vol_window: 6
  refit_interval: 168 # Weekly refit for H1 bars (24 bars/day * 7).
  train_window: 8760 # 1 year lookback for H1 bars (24 bars/day * 365).

risk:
  per_trade_percent: 0.25
  daily_drawdown_percent: 0.5
  catastrophic_sl_pips: 75.0 # Wide failsafe stop. Adjust up or down as needed.

costs:
  commission_per_lot: 7.0
  swap_long_per_night: -2.5
  swap_short_per_night: 0.3

output:
  output_dir: output
  log_dir: output/logs
  quant_analyzer_filename: quant_analyzer.csv
  # Column count Quant Analyzer's auto-detected Format #3 expects (15).
  # main.py checks the export's column count against this as a final
  # sanity check - see export.py's module docstring for why a column-
  # count check replaced the earlier header-text comparison.
  expected_column_count: 15
